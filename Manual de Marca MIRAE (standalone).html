  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

erpo sobre claro */\n  --ink-soft: #5d6e64;\n  --line: rgba(28, 43, 34, 0.14);\n  --line-soft: rgba(28, 43, 34, 0.08);\n  --line-light: rgba(247, 244, 239, 0.18);\n\n  --serif: 'Cormorant Garamond', Georgia, serif;\n  --sans: 'Jost', system-ui, sans-serif;\n\n  --pad: clamp(28px, 6vw, 120px);\n  --maxw: 1180px;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  font-family: var(--sans);\n  font-weight: 300;\n  color: var(--ink);\n  background: var(--roto);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection { background: var(--arena); color: var(--roto); }\n\nimg { max-width: 100%; display: block; }\n\n/* ---------- Layout primitives ---------- */\n.band { width: 100%; padding: clamp(72px, 11vw, 160px) var(--pad); }\n.band--tight { padding-top: clamp(48px, 7vw, 96px); padding-bottom: clamp(48px, 7vw, 96px); }\n.band--dark { background: var(--noche); color: var(--roto); }\n.band--noche2 { background: var(--noche-2); color: var(--roto); }\n.band--warm { background: var(--roto-2); }\n.wrap { max-width: var(--maxw); margin: 0 auto; }\n.wrap--narrow { max-width: 760px; }\n\n.divider-rule { width: 100%; height: 1px; background: var(--line); }\n\n/* ---------- Section kicker / headings ---------- */\n.kicker {\n  display: flex; align-items: baseline; gap: 16px;\n  font-family: var(--sans); font-weight: 300;\n  font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase;\n  color: var(--arena);\n  margin-bottom: clamp(28px, 4vw, 48px);\n}\n.kicker__num { font-variant-numeric: tabular-nums; }\n.kicker__line { flex: 1; height: 1px; background: var(--line); }\n.band--dark .kicker__line, .band--noche2 .kicker__line { background: var(--line-light); }\n\n.h-display {\n  font-family: var(--serif); font-weight: 400;\n  font-size: clamp(34px, 5.4vw, 64px); line-height: 1.04;\n  letter-spacing: 0.01em; color: var(--noche);\n  text-wrap: balance;\n}\n.band--dark .h-display, .band--noche2 .h-display { color: var(--roto); }\n\n.h-display .en {\n  display: block; font-family: var(--sans); font-weight: 200;\n  font-size: 0.32em; letter-spacing: 0.16em; color: var(--arena);\n  margin-top: 0.5em; text-transform: none; font-style: normal;\n}\n\n.lead {\n  font-family: var(--serif); font-weight: 300; font-style: italic;\n  font-size: clamp(20px, 2.4vw, 30px); line-height: 1.5;\n  color: var(--ink); max-width: 30ch; text-wrap: pretty;\n}\n.band--dark .lead { color: var(--roto); }\n\n.body {\n  font-size: clamp(14px, 1.15vw, 16.5px); line-height: 1.92;\n  color: var(--ink); max-width: 64ch; text-wrap: pretty;\n}\n.band--dark .body, .band--noche2 .body { color: rgba(247,244,239,0.82); }\n.body + .body { margin-top: 1.2em; }\n.body .en {\n  display: block; margin-top: 0.85em; font-size: 0.92em;\n  color: var(--ink-soft); font-weight: 300;\n}\n.band--dark .body .en { color: rgba(247,244,239,0.55); }\n\n.eyebrow {\n  font-family: var(--sans); font-weight: 400; font-size: 10.5px;\n  letter-spacing: 0.22em; text-transform: uppercase; color: var(--arena);\n}\n\n/* ============================================================\n   LOGO LOCKUP — reutilizable, escala con --s\n   ============================================================ */\n.lockup {\n  --s: 56px;\n  display: inline-flex; flex-direction: column; align-items: center;\n  font-size: var(--s); line-height: 1; color: var(--noche);\n}\n.lockup__name {\n  font-family: var(--serif); font-weight: 400; font-size: 1em;\n  letter-spacing: 0.28em; line-height: 1;\n  /* compensa el tracking para centrar ópticamente */\n  text-indent: 0.28em;\n}\n.lockup__rule { width: 0.74em; height: 1px; background: var(--arena); margin: 0.34em 0; }\n.lockup__desc {\n  font-family: var(--sans); font-weight: 200; font-size: 0.205em;\n  letter-spacing: 0.34em; text-transform: lowercase; text-indent: 0.34em;\n  color: inherit; opacity: 0.82;\n}\n.lockup--light { color: var(--roto); }\n.lockup--ink { color: var(--negro); }\n.lockup--ink .lockup__rule { background: currentColor; opacity: 0.55; }\n.lockup--horizontal { flex-direction: row; align-items: center; gap: 0.5em; }\n.lockup--horizontal .lockup__rule { width: 1px; height: 0.78em; margin: 0 0; }\n.lockup--horizontal .lockup__desc { font-size: 0.19em; }\n\n/* ---------- Monograma ---------- */\n.mono {\n  --m: 96px;\n  display: inline-flex; flex-direction: column; align-items: center;\n  color: var(--noche);\n}\n.mono__mark {\n  font-family: var(--serif); font-weight: 500; font-size: var(--m);\n  line-height: 0.82; letter-spacing: 0.02em;\n}\n.mono__rule { width: 0.42em; height: 1px; background: var(--arena); margin-top: 0.16em; font-size: var(--m); }\n.mono--light { color: var(--roto); }\n.mono--framed {\n  border: 1px solid var(--line); padding: 0.32em 0.4em 0.26em;\n  border-radius: 2px;\n}\n.band--dark .mono--framed { border-color: var(--line-light); }\n\n/* ============================================================\n   NAV lateral + barra de progreso\n   ============================================================ */\n.progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--arena); width: 0; z-index: 60; transition: width 0.1s linear; }\n\n.sidenav {\n  position: fixed; right: clamp(18px, 3vw, 40px); top: 50%;\n  transform: translateY(-50%); z-index: 50;\n  display: flex; flex-direction: column; gap: 13px;\n}\n.sidenav a {\n  display: flex; align-items: center; gap: 10px; justify-content: flex-end;\n  text-decoration: none; color: var(--arena);\n  font-family: var(--sans); font-weight: 300; font-size: 9.5px;\n  letter-spacing: 0.18em; text-transform: uppercase;\n}\n.sidenav a .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: transparent; border: 1px solid var(--arena);\n  transition: all 0.25s ease; flex-shrink: 0;\n}\n.sidenav a .txt {\n  opacity: 0; transform: translateX(6px);\n  transition: all 0.25s ease; white-space: nowrap; color: var(--ink-soft);\n}\n.sidenav a:hover .txt { opacity: 1; transform: translateX(0); }\n.sidenav a.active .dot { background: var(--arena); transform: scale(1.35); }\n.sidenav a.active .txt { opacity: 1; transform: translateX(0); color: var(--noche); }\n\n/* ============================================================\n   COVER\n   ============================================================ */\n.cover {\n  min-height: 100vh; background: var(--noche); color: var(--roto);\n  display: flex; flex-direction: column;\n  padding: clamp(36px, 5vw, 64px) var(--pad);\n  position: relative; overflow: hidden;\n}\n.cover__top { display: flex; justify-content: space-between; align-items: flex-start;\n  font-family: var(--sans); font-weight: 300; font-size: 10.5px;\n  letter-spacing: 0.28em; text-transform: uppercase; color: var(--arena); }\n.cover__center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: clamp(28px,4vw,52px); }\n.cover__title {\n  font-family: var(--serif); font-weight: 300; font-style: italic;\n  font-size: clamp(20px, 2.6vw, 32px); letter-spacing: 0.02em;\n  color: rgba(247,244,239,0.86); text-align: center; line-height: 1.4;\n}\n.cover__title .en { display:block; font-style: normal; font-family: var(--sans); font-weight: 200; font-size: 0.5em; letter-spacing: 0.3em; text-transform: uppercase; color: var(--arena); margin-top: 1em; }\n.cover__bottom { display:flex; justify-content: space-between; align-items: flex-end;\n  font-family: var(--sans); font-weight: 300; font-size: 10px; letter-spacing: 0.2em;\n  text-transform: uppercase; color: rgba(247,244,239,0.5); }\n.cover__scroll { display:flex; flex-direction: column; align-items:center; gap: 8px; color: var(--arena); font-size: 9px; letter-spacing: 0.3em; }\n.cover__scroll .ln { width:1px; height: 40px; background: var(--arena); opacity: 0.6; animation: drop 2.4s ease-in-out infinite; transform-origin: top; }\n@keyframes drop { 0%,100%{ transform: scaleY(0.3); opacity:0.2;} 50%{ transform: scaleY(1); opacity:0.7;} }\n\n/* ============================================================\n   ÍNDICE\n   ============================================================ */\n.toc { display: grid; grid-template-columns: 1fr 1fr; gap: 0 clamp(40px, 8vw, 120px); }\n.toc__item { display: grid; grid-template-columns: 40px 1fr auto; align-items: baseline;\n  gap: 18px; padding: 20px 0; border-bottom: 1px solid var(--line); text-decoration: none; color: var(--noche); }\n.toc__item:hover .toc__name { color: var(--arena); }\n.toc__num { font-family: var(--sans); font-weight: 300; font-size: 12px; letter-spacing: 0.1em; color: var(--arena); font-variant-numeric: tabular-nums; }\n.toc__name { font-family: var(--serif); font-weight: 400; font-size: clamp(17px, 1.6vw, 21px); transition: color 0.2s; line-height: 1.2; }\n.toc__name .en { display:block; font-family: var(--sans); font-weight: 300; font-size: 0.6em; letter-spacing: 0.08em; color: var(--ink-soft); margin-top: 3px; }\n\n/* ============================================================\n   GRIDS / SPEC layouts\n   ============================================================ */\n.split { display: grid; grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr); gap: clamp(32px, 6vw, 88px); align-items: start; }\n.split--center { align-items: center; }\n@media (max-width: 820px){ .split { grid-template-columns: 1fr; gap: 40px; } }\n\n.specrow { display: grid; grid-template-columns: 180px 1fr; gap: 24px; padding: 18px 0; border-top: 1px solid var(--line); }\n.specrow:last-child { border-bottom: 1px solid var(--line); }\n.specrow__k { font-family: var(--sans); font-weight: 400; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--arena); }\n.specrow__v { font-size: 14.5px; line-height: 1.7; color: var(--ink); }\n.specrow__v .en { display:block; color: var(--ink-soft); font-size: 0.9em; margin-top: 3px; }\n@media (max-width: 600px){ .specrow { grid-template-columns: 1fr; gap: 6px; } }\n\n/* ---------- Showcase frame (logo on backgrounds) ---------- */\n.frame { border: 1px solid var(--line); border-radius: 3px; display: flex; align-items: center; justify-content: center; padding: clamp(40px, 6vw, 80px); position: relative; }\n.frame--noche { background: var(--noche); border-color: transparent; }\n.frame--roto { background: var(--roto); }\n.frame--warm { background: var(--roto-2); }\n.frame--white { background: #fff; }\n.frame--negro { background: var(--negro); border-color: transparent; }\n.frame__tag { position: absolute; top: 14px; left: 16px; font-family: var(--sans); font-weight: 400; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--arena); }\n.frame__cap { position:absolute; bottom: 14px; left: 16px; right: 16px; display:flex; justify-content: space-between; font-family: var(--sans); font-weight: 300; font-size: 9.5px; letter-spacing: 0.12em; color: var(--ink-soft); }\n.frame--noche .frame__cap, .frame--negro .frame__cap { color: rgba(247,244,239,0.5); }\n\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px, 2.4vw, 28px); }\n.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(14px, 2vw, 24px); }\n@media (max-width: 760px){ .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }\n\n/* ---------- Construcción / guías ---------- */\n.construct { position: relative; background: var(--roto-2); border: 1px solid var(--line); border-radius: 3px; padding: clamp(48px, 7vw, 96px); display:flex; align-items:center; justify-content:center; }\n.guide-h, .guide-v { position: absolute; background: var(--arena); opacity: 0.5; }\n.guide-h { left: 0; right: 0; height: 1px; }\n.guide-v { top: 0; bottom: 0; width: 1px; }\n.guide-label { position: absolute; font-family: var(--sans); font-size: 9px; letter-spacing: 0.14em; color: var(--arena); text-transform: uppercase; background: var(--roto-2); padding: 0 5px; }\n\n/* área de respeto */\n.clearspace { position: relative; display: inline-flex; padding: var(--x); }\n.cs-corner { position:absolute; width: 16px; height: 16px; border-color: var(--arena); }\n.cs-zone { position: absolute; inset: 0; border: 1px dashed var(--arena); opacity: 0.55; }\n.cs-x { position:absolute; background: rgba(168,144,112,0.1); }\n\n/* ============================================================\n   COLOR\n   ============================================================ */\n.swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(14px, 2vw, 24px); }\n@media (max-width: 820px){ .swatch-grid { grid-template-columns: repeat(2, 1fr); } }\n.swatch { display: flex; flex-direction: column; }\n.swatch__chip { aspect-ratio: 4/3.4; border-radius: 3px; border: 1px solid var(--line-soft); position: relative; }\n.swatch__role { position:absolute; top: 12px; left: 14px; font-family: var(--sans); font-weight: 400; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; }\n.swatch__meta { padding-top: 14px; }\n.swatch__name { font-family: var(--serif); font-weight: 500; font-size: 18px; color: var(--noche); }\n.swatch__name .en { font-family: var(--sans); font-weight: 300; font-size: 0.62em; color: var(--ink-soft); letter-spacing: 0.04em; }\n.swatch__vals { margin-top: 10px; display:flex; flex-direction: column; gap: 3px; font-family: var(--sans); font-weight: 300; font-size: 11px; letter-spacing: 0.04em; color: var(--ink-soft); font-variant-numeric: tabular-nums; }\n.swatch__vals b { color: var(--ink); font-weight: 400; }\n\n.propbar { display: flex; height: 84px; border-radius: 3px; overflow: hidden; border: 1px solid var(--line-soft); }\n.propbar > div { display:flex; align-items: flex-end; padding: 12px 16px; font-family: var(--sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }\n\n/* ============================================================\n   TIPOGRAFÍA\n   ============================================================ */\n.specimen { border-top: 1px solid var(--line); padding-top: clamp(28px, 4vw, 44px); }\n.specimen__head { display:flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }\n.specimen__fam { font-family: var(--serif); font-weight: 400; font-size: clamp(22px, 2.4vw, 30px); color: var(--noche); }\n.specimen__role { font-family: var(--sans); font-weight: 300; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--arena); }\n.glyphs { font-family: var(--serif); font-weight: 400; font-size: clamp(30px, 4.4vw, 56px); line-height: 1.18; color: var(--noche); letter-spacing: 0.02em; word-spacing: 0.1em; }\n.glyphs--sans { font-family: var(--sans); font-weight: 300; font-size: clamp(22px, 3vw, 38px); letter-spacing: 0.08em; }\n.weights { display:flex; flex-wrap: wrap; gap: 28px; margin-top: 26px; }\n.weights span { font-family: var(--serif); font-size: 26px; color: var(--noche); }\n.weights--sans span { font-family: var(--sans); }\n.weights small { display:block; font-family: var(--sans); font-weight: 300; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--arena); margin-top: 4px; }\n\n.scale-row { display:flex; align-items: baseline; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--line-soft); }\n.scale-row__meta { width: 150px; flex-shrink: 0; font-family: var(--sans); font-weight: 300; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--arena); }\n.scale-row__meta b { display:block; color: var(--ink); font-weight: 400; font-size: 11px; margin-top: 2px; }\n.scale-row__samp { color: var(--noche); line-height: 1.1; }\n\n/* ============================================================\n   TONO DE VOZ\n   ============================================================ */\n.voice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(18px, 3vw, 40px); }\n@media (max-width: 760px){ .voice-grid { grid-template-columns: 1fr; } }\n.voice { border-top: 1px solid var(--line-light); padding-top: 20px; }\n.voice__pair { font-family: var(--serif); font-weight: 400; font-size: clamp(22px, 2.4vw, 28px); color: var(--roto); line-height: 1.25; }\n.voice__pair em { font-style: italic; color: var(--arena); }\n.voice__desc { margin-top: 12px; font-size: 13px; line-height: 1.7; color: rgba(247,244,239,0.7); }\n.voice__desc .en { display:block; margin-top: 6px; color: rgba(247,244,239,0.45); font-size: 0.92em; }\n\n.quotes { display:flex; flex-direction: column; gap: 0; }\n.quote { padding: 22px 0; border-bottom: 1px solid var(--line); display:grid; grid-template-columns: 90px 1fr; gap: 24px; align-items: baseline; }\n.quote__k { font-family: var(--sans); font-weight: 400; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--arena); }\n.quote__t { font-family: var(--serif); font-weight: 400; font-style: italic; font-size: clamp(18px, 2vw, 24px); color: var(--noche); line-height: 1.4; }\n\n/* ============================================================\n   USOS INCORRECTOS\n   ============================================================ */\n.dont-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(14px, 2vw, 24px); }\n@media (max-width: 760px){ .dont-grid { grid-template-columns: 1fr; } }\n.dont { border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }\n.dont__vis { aspect-ratio: 5/3.2; display:flex; align-items:center; justify-content:center; background: var(--roto-2); position: relative; padding: 20px; }\n.dont__x { position:absolute; top: 12px; right: 12px; width: 22px; height: 22px; border-radius: 50%; border: 1px solid #B4544A; color: #B4544A; display:flex; align-items:center; justify-content:center; font-size: 11px; }\n.dont__cap { padding: 16px 18px; font-size: 12.5px; line-height: 1.6; color: var(--ink); border-top: 1px solid var(--line); }\n.dont__cap .en { display:block; color: var(--ink-soft); font-size: 0.88em; margin-top: 3px; }\n\n/* ============================================================\n   APLICACIONES / MOCKUPS\n   ============================================================ */\n.app-card { border-radius: 4px; box-shadow: 0 24px 60px -30px rgba(28,43,34,0.4); overflow: hidden; }\n.placeholder {\n  background-image: repeating-linear-gradient(135deg, rgba(168,144,112,0.16) 0 1px, transparent 1px 9px);\n  background-color: var(--roto-2);\n  display:flex; align-items:center; justify-content:center;\n  font-family: 'SF Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: 0.1em;\n  color: var(--ink-soft); text-transform: uppercase; text-align:center; padding: 16px;\n}\n.band--dark .placeholder { background-color: rgba(247,244,239,0.06); color: rgba(247,244,239,0.5); }\n\n/* business card */\n.bizcard { aspect-ratio: 1.66; display:flex; align-items:center; justify-content:center; position: relative; }\n.bizcard__corner { position:absolute; bottom: 16px; left: 18px; right: 18px; display:flex; justify-content: space-between; align-items: flex-end; font-family: var(--sans); font-weight: 300; font-size: 7.5px; letter-spacing: 0.14em; text-transform: uppercase; }\n\n.app-label { font-family: var(--sans); font-weight: 300; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--arena); margin-top: 16px; }\n.app-label b { color: var(--ink); font-weight: 400; }\n.band--dark .app-label b { color: var(--roto); }\n\n/* signage */\n.sign { aspect-ratio: 4/3; position: relative; overflow: hidden; }\n.sign__plate { position:absolute; inset: 22% 16% auto 16%; aspect-ratio: 2.6; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 30px -16px rgba(0,0,0,0.5); }\n\n/* social */\n.avatar { width: 100%; aspect-ratio: 1; border-radius: 50%; display:flex; align-items:center; justify-content:center; }\n.social-post { aspect-ratio: 1; display:flex; flex-direction: column; }\n\n/* ============================================================\n   FOOTER / COLOFÓN\n   ============================================================ */\n.colophon { display:flex; flex-direction: column; align-items:center; gap: 36px; text-align:center; }\n.colophon__meta { display:flex; gap: clamp(24px, 5vw, 64px); flex-wrap: wrap; justify-content:center; font-family: var(--sans); font-weight: 300; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(247,244,239,0.5); }\n\n/* reveal on scroll */\n.reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1); }\n.reveal.in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce){ .reveal { opacity:1 !important; transform:none !important; } .cover__scroll .ln { animation: none; } html { scroll-behavior: auto; } }\n\n@media (max-width: 680px){ .sidenav { display: none; } .toc { grid-template-columns: 1fr; } }\n\n.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<div class=\"progress\" id=\"progress\"><\u002Fdiv>\n\n<nav class=\"sidenav\" id=\"sidenav\" aria-label=\"Índice de secciones\">\n  <a href=\"#portada\"><span class=\"txt\">Portada<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#indice\"><span class=\"txt\">Índice<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#concepto\"><span class=\"txt\">Concepto<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#esencia\"><span class=\"txt\">Esencia<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#arquitectura\"><span class=\"txt\">Arquitectura<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#construccion\"><span class=\"txt\">Construcción<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#monograma\"><span class=\"txt\">Monograma<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#respeto\"><span class=\"txt\">Área de respeto<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#versiones\"><span class=\"txt\">Versiones<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#color\"><span class=\"txt\">Color<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#tipografia\"><span class=\"txt\">Tipografía<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#voz\"><span class=\"txt\">Tono de voz<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#usos\"><span class=\"txt\">Usos incorrectos<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n  <a href=\"#aplicaciones\"><span class=\"txt\">Aplicaciones<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fa>\n<\u002Fnav>\n\n<!-- ============================ PORTADA ============================ -->\n<header class=\"cover\" id=\"portada\">\n  <div class=\"cover__top\">\n    <span>MIRAE<\u002Fspan>\n    <span>Málaga · 2026<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"cover__center\">\n    <div class=\"lockup lockup--light\" style=\"--s: clamp(64px, 11vw, 150px);\">\n      <span class=\"lockup__name\">MIRAE<\u002Fspan>\n      <span class=\"lockup__rule\"><\u002Fspan>\n      <span class=\"lockup__desc\">clínica de la mirada<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cover__title\">\n      Manual de Identidad Visual\n      <span class=\"en\">Visual Identity Manual<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cover__bottom\">\n    <span>Documento confidencial<br>Confidential document<\u002Fspan>\n    <div class=\"cover__scroll\">\n      <span>SCROLL<\u002Fspan>\n      <span class=\"ln\"><\u002Fspan>\n    <\u002Fdiv>\n    <span>Volumen 01<br>Edición 2026<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============================ ÍNDICE ============================ -->\n<section class=\"band band--warm\" id=\"indice\">\n  <div class=\"wrap\">\n    <div class=\"kicker reveal\"><span class=\"kicker__num\">00<\u002Fspan><span>Índice · Contents<\u002Fspan><span class=\"kicker__line\"><\u002Fspan><\u002Fdiv>\n    <nav class=\"toc reveal\">\n      <a class=\"toc__item\" href=\"#concepto\"><span class=\"toc__num\">01<\u002Fspan><span class=\"toc__name\">Concepto y esencia<span class=\"en\">Concept &amp; essence<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#esencia\"><span class=\"toc__num\">02<\u002Fspan><span class=\"toc__name\">Atributos de marca<span class=\"en\">Brand attributes<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#arquitectura\"><span class=\"toc__num\">03<\u002Fspan><span class=\"toc__name\">Arquitectura verbal<span class=\"en\">Verbal architecture<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#construccion\"><span class=\"toc__num\">04<\u002Fspan><span class=\"toc__name\">Construcción del logotipo<span class=\"en\">Logotype construction<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#monograma\"><span class=\"toc__num\">05<\u002Fspan><span class=\"toc__name\">Monograma<span class=\"en\">Monogram<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#respeto\"><span class=\"toc__num\">06<\u002Fspan><span class=\"toc__name\">Área de respeto y tamaño mínimo<span class=\"en\">Clear space &amp; minimum size<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#versiones\"><span class=\"toc__num\">07<\u002Fspan><span class=\"toc__name\">Versiones del logotipo<span class=\"en\">Logotype versions<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#color\"><span class=\"toc__num\">08<\u002Fspan><span class=\"toc__name\">Paleta cromática<span class=\"en\">Colour palette<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#tipografia\"><span class=\"toc__num\">09<\u002Fspan><span class=\"toc__name\">Sistema tipográfico<span class=\"en\">Typographic system<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#voz\"><span class=\"toc__num\">10<\u002Fspan><span class=\"toc__name\">Tono de voz<span class=\"en\">Tone of voice<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#usos\"><span class=\"toc__num\">11<\u002Fspan><span class=\"toc__name\">Usos incorrectos<span class=\"en\">Misuse<\u002Fspan><\u002Fspan><\u002Fa>\n      <a class=\"toc__item\" href=\"#aplicaciones\"><span class=\"toc__num\">12<\u002Fspan><span class=\"toc__name\">Aplicaciones<span class=\"en\">Applications<\u002Fspan><\u002Fspan><\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ 01 CONCEPTO ============================ -->\n<section class=\"band\" id=\"concepto\">\n  <div class=\"wrap\">\n    <div class=\"kicker reveal\"><span class=\"kicker__num\">01<\u002Fspan><span>Concepto · Concept<\u002Fspan><span class=\"kicker__line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"split\">\n      <div class=\"reveal\">\n        <h2 class=\"h-display\">La mirada como<br>especialidad<span class=\"en\">The gaze as a specialty<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"reveal\">\n        <p class=\"lead\">MIRAE no es estética genérica. Es especialización médica de alto nivel con una experiencia premium discreta y serena.<\u002Fp>\n        <p class=\"body\" style=\"margin-top: 32px;\">MIRAE es una clínica especializada en cirugía de la mirada, blefaroplastia, estética periocular y rejuvenecimiento facial natural. Su identidad debe transmitir precisión, naturalidad y autoridad médica con elegancia sobria.\n          <span class=\"en\">MIRAE is a clinic specialised in eye-area surgery, blepharoplasty, periocular aesthetics and natural facial rejuvenation. Its identity must convey precision, naturalness and medical authority with restrained elegance.<\u002Fspan>\n        <\u002Fp>\n        <p class=\"body\">No es lujo ostentoso, ni clínica de estética convencional. Es autoridad clínica vivida con calma.\n          <span class=\"en\">It is neither ostentatious luxury nor a conventional aesthetics clinic. It is clinical authority experienced with calm.<\u002Fspan>\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ 02 ESENCIA / ATRIBUTOS ============================ -->\n<section class=\"band band--dark\" id=\"esencia\">\n  <div class=\"wrap\">\n    <div class=\"kicker reveal\"><span class=\"kicker__num\">02<\u002Fspan><span>Atributos · Attributes<\u002Fspan><span class=\"kicker__line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"grid-2\" style=\"gap: 1px; background: var(--line-light); border: 1px solid var(--line-light);\">\n      <div class=\"reveal\" style=\"background: var(--noche); padding: clamp(32px,4vw,52px);\">\n        <div class=\"eyebrow\">01 — Precisión<\u002Fdiv>\n        <h3 class=\"h-display\" style=\"font-size: clamp(26px,3vw,38px); margin: 14px 0 16px;\">Precisión<span class=\"en\" style=\"font-size:0.34em;\">Precision<\u002Fspan><\u002Fh3>\n        <p class=\"body\">Cada trazo responde a una razón. La geometría limpia y el espaciado medido reflejan el rigor del acto quirúrgico.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"background: var(--noche); padding: clamp(32px,4vw,52px);\">\n        <div class=\"eyebrow\">02 — Naturalidad<\u002Fdiv>\n        <h3 class=\"h-display\" style=\"font-size: clamp(26px,3vw,38px); margin: 14px 0 16px;\">Naturalidad<span class=\"en\" style=\"font-size:0.34em;\">Naturalness<\u002Fspan><\u002Fh3>\n        <p class=\"body\">El resultado no se nota, se siente. Tonos tierra y trazos finos evocan lo orgánico, nunca lo artificial.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"background: var(--noche); padding: clamp(32px,4vw,52px);\">\n        <div class=\"eyebrow\">03 — Autoridad<\u002Fdiv>\n        <h3 class=\"h-display\" style=\"font-size: clamp(26px,3vw,38px); margin: 14px 0 16px;\">Autoridad<span class=\"en\" style=\"font-size:0.34em;\">Authority<\u002Fspan><\u002Fh3>\n        <p class=\"body\">La serif contemporánea aporta permanencia y prestigio clínico, sin recurrir a códigos hospitalarios fríos.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"background: var(--noche); padding: clamp(32px,4vw,52px);\">\n        <div class=\"eyebrow\">04 — Serenidad<\u002Fdiv>\n        <h3 class=\"h-display\" style=\"font-size: clamp(26px,3vw,38px); margin: 14px 0 16px;\">Serenidad<span class=\"en\" style=\"font-size:0.34em;\">Serenity<\u002Fspan><\u002Fh3>\n        <p class=\"body\">El espacio en blanco y el verde noche generan una calma premium y discreta que tranquiliza al paciente.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ 03 ARQUITECTURA VERBAL ============================ -->\n<section class=\"band\" id=\"arquitectura\">\n  <div class=\"wrap\">\n    <div class=\"kicker reveal\"><span class=\"kicker__num\">03<\u002Fspan><span>Arquitectura verbal · Verbal architecture<\u002Fspan><span class=\"kicker__line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"split split--center\">\n      <div class=\"reveal\">\n        <h2 class=\"h-display\">Una jerarquía,<br>tres elementos<span class=\"en\">One hierarchy, three elements<\u002Fspan><\u002Fh2>\n        <p class=\"body\" style=\"margin-top: 28px;\">El logotipo articula nombre, separador y descriptor en un orden inalterable. MIRAE es el protagonista absoluto; el descriptor lo ancla en su categoría; el filete dorado los une con precisión.\n          <span class=\"en\">The logotype articulates name, separator and descriptor in an unalterable order. MIRAE is the absolute protagonist; the descriptor anchors its category; the gold rule joins them with precision.<\u002Fspan>\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\">\n        <div class=\"frame frame--noche\" style=\"padding: clamp(56px,8vw,110px) clamp(40px,6vw,80px);\">\n          <div class=\"lockup lockup--light\" style=\"--s: clamp(56px, 9vw, 96px);\">\n            <span class=\"lockup__name\">MIRAE<\u002Fspan>\n            <span class=\"lockup__rule\"><\u002Fspan>\n            <span class=\"lockup__desc\">clínica de la mirada<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top: clamp(40px,6vw,72px);\">\n      <div class=\"specrow reveal\">\n        <div class=\"specrow__k\">Nombre · Name<\u002Fdiv>\n        <div class=\"specrow__v\">MIRAE — protagonista absoluto, en serif a tamaño dominante.<span class=\"en\">MIRAE — absolute protagonist, serif at dominant size.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specrow reveal\">\n        <div class=\"specrow__k\">Descriptor<\u002Fdiv>\n        <div class=\"specrow__v\">«clínica de la mirada» al 30–35 % del tamaño visual de MIRAE.<span class=\"en\">“clínica de la mirada” at 30–35 % of MIRAE's visual size.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specrow reveal\">\n        <div class=\"specrow__k\">Separador · Separator<\u002Fdiv>\n        <div class=\"specrow__v\">Filete fino en dorado arena, centrado entre ambos.<span class=\"en\">Thin sand-gold rule, centred between the two.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specrow reveal\">\n        <div class=\"specrow__k\">Idioma · Language<\u002Fdiv>\n        <div class=\"specrow__v\">El descriptor permanece siempre en español; no se traduce.<span class=\"en\">The descriptor always stays in Spanish; it is never translated.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ 04 CONSTRUCCIÓN ============================ -->\n<section class=\"band band--warm\" id=\"construccion\">\n  <div class=\"wrap\">\n    <div class=\"kicker reveal\"><span class=\"kicker__num\">04<\u002Fspan><span>Construcción · Construction<\u002Fspan><span class=\"kicker__line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"split\">\n      <div class=\"reveal\">\n        <h2 class=\"h-display\">Proporción<br>y retícula<span class=\"en\">Proportion &amp; grid<\u002Fspan><\u002Fh2>\n        <p class=\"body\" style=\"margin-top: 28px;\">El conjunto se construye sobre una unidad <b>X<\u002Fb>, equivalente a la altura de mayúscula de MIRAE. Esta unidad gobierna el grosor del filete, las distancias verticales y la escala del descriptor.\n          <span class=\"en\">The lockup is built on a unit <b>X<\u002Fb>, equal to MIRAE's cap height. This unit governs the rule weight, vertical distances and descriptor scale.<\u002Fspan>\n        <\u002Fp>\n        <div style=\"margin-top: 28px;\">\n          <div class=\"specrow reveal\" style=\"border-top: 1px solid var(--line);\"><div class=\"specrow__k\">Filete · Rule<\u002Fdiv><div class=\"specrow__v\">Ancho 0,74 X · grosor 1 px óptico<\u002Fdiv><\u002Fdiv>\n          <div class=\"specrow reveal\"><div class=\"specrow__k\">Aire superior<\u002Fdiv><div class=\"specrow__v\">0,34 X entre nombre y filete<\u002Fdiv><\u002Fdiv>\n          <div class=\"specrow reveal\"><div class=\"specrow__k\">Descriptor<\u002Fdiv><div class=\"specrow__v\">Altura ≈ 0,20 X · tracking +340<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\">\n        <div class=\"construct\" id=\"construct\">\n          <div class=\"guide-h\" style=\"top: 50%;\"><\u002Fdiv>\n          <div class=\"guide-v\" style=\"left: 50%;\"><\u002Fdiv>\n          <div class=\"lockup lockup--ink\" style=\"--s: clamp(48px, 8vw, 88px); position: relative; z-index: 2;\">\n            <span class=\"lockup__name\" style=\"color: var(--noche);\">MIRAE<\u002Fspan>\n            <span class=\"lockup__rule\"><\u002Fspan>\n            <span class=\"lockup__desc\" style=\"color: var(--noche);\">clínica de la mirada<\u002Fspan>\n          <\u002Fdiv>\n          <span class=\"guide-label\" style=\"top: calc(50% - 8px); right: 18px;\">eje horizontal<\u002Fspan>\n          <span class=\"guide-label\" style=\"left: calc(50% + 6px); top: 18px;\">eje · centro<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ 05 MONOGRAMA ============================ -->\n<section class=\"band band--dark\" id=\"monograma\">\n  <div class=\"wrap\">\n    <div class=\"kicker reveal\"><span class=\"kicker__num\">05<\u002Fspan><span>Monograma · Monogram<\u002Fspan><span class=\"kicker__line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"split\">\n      <div class=\"reveal\">\n        <h2 class=\"h-display\">Una marca breve<br>para espacios mínimos<span class=\"en\">A short mark for minimal spaces<\u002Fspan><\u002Fh2>\n        <p class=\"body\" style=\"margin-top: 28px;\">Propuesta sobria, estrictamente tipográfica. La <b>M<\u002Fb> en serif contemporánea, acompañada del filete dorado, condensa la identidad sin recurrir a símbolos figurativos. Funciona como avatar, sello, favicon o marca de agua.\n          <span class=\"en\">A restrained, strictly typographic proposal. The serif <b>M<\u002Fb>, paired with the gold rule, distils the identity without figurative symbols. It works as avatar, seal, favicon or watermark.<\u002Fspan>\n        <\u002Fp>\n        <p class=\"body\">Respeta el briefing: sin iconos de ojo, párpado o bisturí.\n          <span class=\"en\">It respects the brief: no eye, eyelid or scalpel icons.<\u002Fspan>\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\">\n        <div class=\"grid-3\" style=\"gap: 1px; background: var(--line-light); border: 1px solid var(--line-light);\">\n          <div class=\"frame frame--noche\" style=\"padding: clamp(28px,4vw,46px); border-radius: 0;\">\n            <span class=\"frame__tag\">Primario<\u002Fspan>\n            <div class=\"mono mono--light\"><span class=\"mono__mark\">M<\u002Fspan><span class=\"mono__rule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"frame frame--noche\" style=\"padding: clamp(28px,4vw,46px); border-radius: 0;\">\n onsúltese con la dirección de marca.\n      <span class=\"en\">This manual defines the correct use of MIRAE's visual identity. For any application not covered here, please consult brand management.<\u002Fspan>\n    <\u002Fp>\n    <div class=\"colophon__meta\">\n      <span>Manual de identidad · v01<\u002Fspan>\n      <span>Málaga · 2026<\u002Fspan>\n      <span>Confidencial<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // Barra de progreso\n  const progress = document.getElementById('progress');\n  const onScroll = () => {\n    const h = document.documentElement;\n    const max = h.scrollHeight - h.clientHeight;\n    progress.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';\n  };\n  window.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n\n  // Reveal on scroll\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // Nav lateral activo\n  const navLinks = [...document.querySelectorAll('.sidenav a')];\n  const sections = navLinks.map(a => document.querySelector(a.getAttribute('href')));\n  const navIO = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const i = sections.indexOf(e.target);\n        navLinks.forEach(l => l.classList.remove('active'));\n        if (navLinks[i]) navLinks[i].classList.add('active');\n      }\n    });\n  }, { threshold: 0.5, rootMargin: '-20% 0px -40% 0px' });\n  sections.forEach(s => s && navIO.observe(s));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
